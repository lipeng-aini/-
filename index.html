<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马迹山仓库管理系统</title>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.11.0/cloudbase.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
body { background-color: #f5f7fa; font-size: 14px; }
.login-wrap { position: fixed; width: 100%; height: 100%; background: #f5f7fa; display: flex; align-items: center; justify-content: center; }
.login-box { width: 90%; max-width: 320px; background: #fff; padding: 30px 25px; border-radius: 12px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); text-align: center; }
.top-title { font-size: 22px; color: #007bff; font-weight: bold; margin-bottom: 8px; }
.sub-title { font-size: 16px; color: #333; font-weight: bold; margin-bottom: 25px; }
.login-box input { width: 100%; height: 44px; padding: 0 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 18px; outline: none; text-align: center; }
.login-box input:focus { border-color: #007bff; }
.login-box button { width: 100%; height: 44px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
.btn-admin { background-color: #28a745; color: #fff; }
.btn-guest { background-color: #007bff; color: #fff; }
.container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; }
h2 { text-align: center; margin-bottom: 15px; color: #333; font-size: 18px; }
.tab { display: flex; border-bottom: 1px solid #ccc; margin-bottom: 15px; flex-wrap: wrap; }
.tab-item { padding: 8px 12px; cursor: pointer; font-size: 13px; }
.tab-item.active { border-bottom: 2px solid #007bff; color: #007bff; font-weight: bold; }
.box { display: none; }
.box.show { display: block; }
input, select, button { padding: 8px; margin: 3px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%; max-width: 280px; }
button { background: #007bff; color: #fff; border: none; cursor: pointer; }
.del-row { background: #dc3545; padding: 4px 6px; font-size: 12px; border: none; border-radius: 3px; color: #fff; }
.print-btn { background: #28a745; margin-bottom: 10px; max-width: 120px; }
.photo-btn { background: #6c5ce7; max-width: 280px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
th, td { border: 1px solid #ccc; padding: 6px 2px; text-align: center; }
th { background: #eee; }
.warn { color: red; font-weight: bold; }
.tip { font-size: 12px; color: #666; margin-left: 4px; }
.search-box { width: 100%; max-width: 300px; margin-bottom: 10px; }
.img-preview { max-width: 60px; height: auto; cursor: pointer; }
#photoInput { display: none; }
.guest-mode .del-row { display: none !important; }
.sync-tip { font-size: 12px; color: #28a745; text-align: center; margin-bottom: 10px; }
@media print {
    .tab, .print-btn, .del-row, #box0, #box1, #box2 { display: none !important; }
    .box.show { display: block !important; }
    body { background: #fff; padding: 0; }
    .container { padding: 0; }
    thead { display: table-header-group; }
    tr { page-break-inside: avoid; }
}
</style>
</head>
<body>
<div class="login-wrap" id="loginPage">
<div class="login-box">
<div class="top-title">仓库系统</div>
<div class="sub-title">马迹山仓库登录</div>
<input type="password" id="pwdInput" placeholder="请输入管理员密码">
<button class="btn-admin" onclick="adminLogin()">管理员登录</button>
<button class="btn-guest" onclick="guestLogin()">游客进入</button>
</div>
</div>

<div class="container" id="mainPage" style="display:none;">
<h2>马迹山仓库</h2>
<div class="sync-tip">✅ 腾讯云云端实时同步（全网互通）</div>
<div class="tab">
<div class="tab-item active" onclick="switchTab(0)">物料管理</div>
<div class="tab-item" onclick="switchTab(1)">入库登记</div>
<div class="tab-item" onclick="switchTab(2)">出库登记</div>
<div class="tab-item" onclick="switchTab(3)">库存列表</div>
<div class="tab-item" onclick="switchTab(4)">入库流水</div>
<div class="tab-item" onclick="switchTab(5)">出库流水</div>
</div>

<div class="box show" id="box0">
<h4>新增物料</h4>
<input type="text" id="mName" placeholder="物料名称">
<input type="text" id="mCate" placeholder="分类">
<input type="text" id="mSpec" placeholder="规格">
<input type="text" id="mUnit" placeholder="单位">
<input type="number" id="mMin" placeholder="最低预警库存" value="2">
<button onclick="addMaterial()">添加</button>
<table id="materialTable"></table>
</div>

<div class="box" id="box1">
<h4>物料入库</h4>
<select id="inGoods"></select>
<input type="number" id="inNum" placeholder="入库数量" min="1">
<input type="text" id="inPerson" placeholder="入库人">
<input type="datetime-local" id="inTime">
<div class="tip">不选时间默认当前时间</div>
<input type="text" id="inRemark" placeholder="存放楼层">
<input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
<button class="photo-btn" onclick="document.getElementById('photoInput').click()">拍照/选择图片</button>
<div id="showPhoto"></div>
<button onclick="stockIn()">确认入库</button>
</div>

<div class="box" id="box2">
<h4>物料出库</h4>
<select id="outGoods"></select>
<input type="number" id="outNum" placeholder="出库数量" min="1">
<input type="text" id="outPerson" placeholder="出库人">
<input type="datetime-local" id="outTime">
<input type="text" id="outRemark" placeholder="用途备注">
<button onclick="stockOut()">确认出库</button>
</div>

<div class="box" id="box3">
<h4>库存列表</h4>
<input class="search-box" type="text" id="stockSearch" placeholder="搜索物料">
<button class="print-btn" onclick="window.print()">打印库存</button>
<table id="stockTable"></table>
</div>

<div class="box" id="box4">
<h4>入库流水记录</h4>
<button class="print-btn" onclick="window.print()">打印入库流水</button>
<table id="inLogTable"></table>
</div>

<div class="box" id="box5">
<h4>出库流水记录</h4>
<button class="print-btn" onclick="window.print()">打印出库流水</button>
<table id="outLogTable"></table>
</div>
</div>

<script>
// 你的腾讯云环境ID
const envId = "100048544621";
// 初始化云开发
const app = cloudbase.init({ env: envId });
const db = app.database();
const coll = db.collection("wareData");

let material = [];
let inLog = [];
let outLog = [];
let isAdmin = false;
let tempPhotoBase64 = "";
const adminPwd = "123456";

// 从云端加载数据
async function loadCloud() {
  let res = await coll.doc("main").get();
  if (res.data) {
    material = res.data.material || [];
    inLog = res.data.inLog || [];
    outLog = res.data.outLog || [];
  }
  renderAll();
}

// 保存到云端
async function saveCloud() {
  await coll.doc("main").set({ material, inLog, outLog });
}

// 每2秒自动同步
setInterval(loadCloud, 2000);

function getNowTime() {
  return new Date().toLocaleString();
}

function adminLogin() {
  let p = document.getElementById("pwdInput").value;
  if (p === adminPwd) {
    isAdmin = true;
    enterSys();
  } else {
    alert("密码错误");
  }
}
function guestLogin() {
  isAdmin = false;
  enterSys();
}
function enterSys() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  if (!isAdmin) document.getElementById("mainPage").classList.add("guest-mode");
  loadCloud();
}

function switchTab(i) {
  document.querySelectorAll(".box").forEach(x => x.classList.remove("show"));
  document.querySelectorAll(".tab-item").forEach(x => x.classList.remove("active"));
  document.getElementById("box" + i).classList.add("show");
  event.target.classList.add("active");
  if (i === 1 || i === 2) refreshSelect();
}
function refreshSelect() {
  let ins = document.getElementById("inGoods");
  let outs = document.getElementById("outGoods");
  ins.innerHTML = "";
  outs.innerHTML = "";
  material.forEach(m => {
    ins.innerHTML += `<option value="${m.id}">${m.name} ${m.spec}</option>`;
    outs.innerHTML += `<option value="${m.id}">${m.name} ${m.spec}</option>`;
  });
}

async function addMaterial() {
  let name = document.getElementById("mName").value.trim();
  let cate = document.getElementById("mCate").value.trim();
  let spec = document.getElementById("mSpec").value.trim();
  let unit = document.getElementById("mUnit").value.trim();
  let min = parseInt(document.getElementById("mMin").value) || 2;
  if (!name || !cate || !spec || !unit) {
    alert("请填写完整信息");
    return;
  }
  material.push({
    id: Date.now(),
    name, cate, spec, unit,
    stock: 0,
    min: min
  });
  await saveCloud();
  document.getElementById("mName").value = "";
  renderAll();
}

function handlePhoto(file) {
  if (!file.files.length) return;
  let reader = new FileReader();
  reader.onload = function (e) {
    tempPhotoBase64 = e.target.result;
    document.getElementById("showPhoto").innerHTML = `<img src="${tempPhotoBase64}" style="max-width:100px;">`;
  }
  reader.readAsDataURL(file.files[0]);
}
function showBigImg(src) {
  window.open(src);
}

async function stockIn() {
  let id = parseInt(document.getElementById('inGoods').value);
  let num = parseInt(document.getElementById('inNum').value);
  let person = document.getElementById('inPerson').value.trim();
  let time = document.getElementById('inTime').value || getNowTime();
  let remark = document.getElementById('inRemark').value.trim();
  if (!id || !num || num <= 0) { alert('请选择物料并输入有效数量'); return; }
  let mat = material.find(x => x.id === id);
  mat.stock += num;
  inLog.unshift({
    mid: mat.id,
    mName: mat.name,
    spec: mat.spec,
    num, person, time,
    floor: remark,
    photo: tempPhotoBase64
  });
  await saveCloud();
  alert('入库成功');
  document.getElementById('inNum').value = '';
  document.getElementById('inPerson').value = '';
  document.getElementById('inRemark').value = '';
  document.getElementById('showPhoto').innerHTML = '';
  tempPhotoBase64 = "";
  renderAll();
}

async function stockOut() {
  let id = parseInt(document.getElementById('outGoods').value);
  let num = parseInt(document.getElementById('outNum').value);
  let person = document.getElementById('outPerson').value.trim();
  let time = document.getElementById('outTime').value || getNowTime();
  let remark = document.getElementById('outRemark').value.trim();
  if (!id || !num || num <= 0) { alert('请选择物料并输入有效数量'); return; }
  let mat = material.find(x => x.id === id);
  if (mat.stock < num) { alert('库存不足，无法出库'); return; }
  mat.stock -= num;
  outLog.unshift({
    mid: mat.id,
    mName: mat.name,
    spec: mat.spec,
    num, person, time,
    useRemark: remark
  });
  await saveCloud();
  alert('出库成功');
  document.getElementById('outNum').value = '';
  document.getElementById('outPerson').value = '';
  document.getElementById('outRemark').value = '';
  renderAll();
}

async function delInLog(idx) {
  if (!isAdmin) { alert('无权限删除'); return; }
  if (!confirm('确定删除这条入库记录？库存将自动退回')) return;
  let row = inLog[idx];
  let mat = material.find(item => item.id === row.mid);
  if (mat) mat.stock -= row.num;
  inLog.splice(idx, 1);
  await saveCloud();
}

async function delOutLog(idx) {
  if (!isAdmin) { alert('无权限删除'); return; }
  if (!confirm('确定删除这条出库记录？库存将自动恢复')) return;
  let row = outLog[idx];
  let mat = material.find(item => item.id === row.mid);
  if (mat) mat.stock += row.num;
  outLog.splice(idx, 1);
  await saveCloud();
}

function renderAll() {
  renderMaterial();
  renderStock();
  renderInLog();
  renderOutLog();
  refreshSelect();
}

function renderMaterial() {
  let tab = document.getElementById("materialTable");
  tab.innerHTML = "";
  material.forEach(m => {
    tab.innerHTML += `<tr>
            <td>${m.name}</td>
            <td>${m.cate}</td>
            <td>${m.spec}</td>
            <td>${m.unit}</td>
            <td>${m.min}</td>
            <td>${isAdmin?'<button class="del-row" onclick="delMat('+m.id+')">删除</button>':''}</td>
        </tr>`;
  });
}
async function delMat(id) {
  if (!confirm("确定删除？")) return;
  material = material.filter(x => x.id !== id);
  await saveCloud();
  renderAll();
}

function renderStock() {
  let key = document.getElementById('stockSearch').value.toLowerCase();
  let tab = document.getElementById('stockTable');
  tab.innerHTML = '<tr><th>名称</th><th>分类</th><th>规格</th><th>单位</th><th>当前库存</th><th>预警库存</th></tr>';
  material.forEach(item => {
    if (item.name.toLowerCase().includes(key) || item.cate.toLowerCase().includes(key)) {
      let tr = document.createElement('tr');
      let warn = item.stock <= item.min ? 'warn' : '';
      tr.innerHTML = `
                <td>${item.name}</td>
                <td>${item.cate}</td>
                <td>${item.spec}</td>
                <td>${item.unit}</td>
                <td class="${warn}">${item.stock}</td>
                <td>${item.min}</td>
            `;
      tab.appendChild(tr);
    }
  });
}

function renderInLog() {
  let tab = document.getElementById('inLogTable');
  tab.innerHTML = '<tr><th>时间</th><th>物料</th><th>规格</th><th>数量</th><th>入库人</th><th>存放楼层</th><th>照片</th><th>操作</th></tr>';
  inLog.forEach((item, idx) => {
    let imgHtml = item.photo ? `<img src="${item.photo}" class="img-preview" onclick="showBigImg('${item.photo}')">` : "无";
    let tr = document.createElement('tr');
    tr.innerHTML = `
            <td>${item.time}</td>
            <td>${item.mName}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${item.person}</td>
            <td>${item.floor||''}</td>
            <td>${imgHtml}</td>
            <td><button class="del-row" onclick="delInLog(${idx})">删除</button></td>
        `;
    tab.appendChild(tr);
  });
}

function renderOutLog() {
  let tab = document.getElementById('outLogTable');
  tab.innerHTML = '<tr><th>时间</th><th>物料</th><th>规格</th><th>数量</th><th>出库人</th><th>用途备注</th><th>操作</th></tr>';
  outLog.forEach((item, idx) => {
    let tr = document.createElement('tr');
    tr.innerHTML = `
            <td>${item.time}</td>
            <td>${item.mName}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${item.person}</td>
            <td>${item.useRemark||''}</td>
            <td><button class="del-row" onclick="delOutLog(${idx})">删除</button></td>
        `;
    tab.appendChild(tr);
  });
}

// 空闲刷新
let idleTime = 0;
const maxIdle = 180;
function resetIdle() { idleTime = 0; }
window.addEventListener('keydown', resetIdle);
window.addEventListener('mousemove', resetIdle);
window.addEventListener('scroll', resetIdle);
setInterval(function () {
  idleTime++;
  if (idleTime >= maxIdle) {
    location.reload();
  }
}, 1000);
</script>

</body>
</html>
