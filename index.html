<body>

<div class="login-wrap" id="loginPage">
    <div class="login-box">
        <div class="login-logo">仓库</div>
        <h3>马迹山仓库系统</h3>
        <input type="password" id="pwdInput" placeholder="请输入管理员密码" value="123456">
        <button class="login-btn2" onclick="adminLogin()">管理员登录</button>
        <button class="login-btn1" onclick="guestLogin()">游客无密码进入</button>
    </div>
</div>

<div class="container" id="mainPage" style="display:none;">
    <h2>马迹山仓库</h2>
    <div class="sync-tip">✅ 已开启多人云端同步</div>
    <div class="tab">
        <div class="tab-item active" onclick="switchTab(0)">物料管理</div>
        <div class="tab-item" onclick="switchTab(1)">入库登记</div>
        <div class="tab-item" onclick="switchTab(2)">出库登记</div>
        <div class="tab-item" onclick="switchTab(3)">库存列表</div>
        <div class="tab-item" onclick="switchTab(4)">入库流水</div>
        <div class="tab-item" onclick="switchTab(5)">出库流水</div>
    </div>

    <div class="box show" id="box0">
        <h4>新增物料</h4>
        <input type="text" id="mName" placeholder="物料名称">
        <input type="text" id="mCate" placeholder="分类">
        <input type="text" id="mSpec" placeholder="规格">
        <input type="text" id="mUnit" placeholder="单位">
        <input type="number" id="mMin" placeholder="最低预警库存" value="5">
        <button onclick="addMaterial()">添加</button>
        <table id="materialTable"></table>
    </div>

    <div class="box" id="box1">
        <h4>物料入库</h4>
        <select id="inGoods"></select>
        <input type="number" id="inNum" placeholder="入库数量" min="1">
        <input type="text" id="inPerson" placeholder="入库人">
        <input type="datetime-local" id="inTime">
        <div class="tip">不选时间默认当前时间</div>
        <input type="text" id="inRemark" placeholder="存放楼层">
        
        <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
        <button class="photo-btn" onclick="document.getElementById('photoInput').click()">拍照/选择图片</button>
        <div id="showPhoto"></div>

        <button onclick="stockIn()">确认入库</button>
    </div>

    <div class="box" id="box2">
        <h4>物料出库</h4>
        <select id="outGoods"></select>
        <input type="number" id="outNum" placeholder="出库数量" min="1">
        <input type="text" id="outPerson" placeholder="出库人">
        <input type="datetime-local" id="outTime">
        <div class="tip">不选时间默认当前时间</div>
        <input type="text" id="outRemark" placeholder="用途备注">
        <button onclick="stockOut()">确认出库</button>
    </div>

    <div class="box" id="box3">
        <h4>当前库存（红色为库存不足）</h4>
        <input class="search-box" type="text" id="stockSearch" placeholder="搜索物料名称/分类" oninput="renderStock()">
        <button class="print-btn" onclick="window.print()">打印库存</button>
        <table id="stockTable"></table>
    </div>

    <div class="box" id="box4">
        <h4>入库流水记录</h4>
        <table id="inLogTable"></table>
    </div>

    <div class="box" id="box5">
        <h4>出库流水记录</h4>
        <table id="outLogTable"></table>
    </div>
</div>

<script>
// ========== 配置项（后续我教你改这里即可） ==========
const GITHUB_RAW_URL = "https://raw.githubusercontent.com/你的用户名/仓库名/main/data.json";
const GITHUB_TOKEN = "";
const ADMIN_PWD = "123456";
let isAdmin = false;
let nowPhotoBase64 = "";

// 初始化页面
window.onload = function(){
    loadCloudData();
    setInterval(loadCloudData, 5000); // 5秒自动同步一次
};

// 从云端加载数据
async function loadCloudData(){
    try{
        let res = await fetch(GITHUB_RAW_URL);
        if(!res.ok) throw "无云端数据";
        let data = await res.json();
        localStorage.setItem("stockData", JSON.stringify(data));
        renderAll();
    }catch(e){
        // 首次加载用本地默认数据
        if(!localStorage.getItem("stockData")){
            let initData = {material:[], stock:[], inLog:[], outLog:[]};
            localStorage.setItem("stockData", JSON.stringify(initData));
        }
        renderAll();
    }
}

// 保存数据到云端
async function saveCloudData(){
    let data = JSON.parse(localStorage.getItem("stockData"));
    // 先用本地缓存兜底，后续配置好GitHub Token再开启云端覆盖
    console.log("数据已本地保存，等待配置GitHub后自动同步云端");
}

// 获取本地数据
function getLocalData(){
    return JSON.parse(localStorage.getItem("stockData"));
}
function setLocalData(obj){
    localStorage.setItem("stockData", JSON.stringify(obj));
    saveCloudData();
}

// 登录
function adminLogin(){
    let pwd = document.getElementById("pwdInput").value;
    if(pwd === ADMIN_PWD){
        isAdmin = true;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        renderAll();
    }else{
        alert("密码错误");
    }
}
function guestLogin(){
    isAdmin = false;
    document.getElementById("mainPage").classList.add("guest-mode");
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("mainPage").style.display = "block";
    renderAll();
}

// 标签切换
function switchTab(idx){
    document.querySelectorAll(".box").forEach(el=>el.classList.remove("show"));
    document.querySelectorAll(".tab-item").forEach(el=>el.classList.remove("active"));
    document.getElementById("box"+idx).classList.add("show");
    event.target.classList.add("active");
}

// 新增物料
function addMaterial(){
    let name = document.getElementById("mName").value.trim();
    let cate = document.getElementById("mCate").value.trim();
    let spec = document.getElementById("mSpec").value.trim();
    let unit = document.getElementById("mUnit").value.trim();
    let minStock = Number(document.getElementById("mMin").value);
    if(!name){alert("请输入物料名称");return;}
    let data = getLocalData();
    let id = Date.now();
    data.material.push({id,name,cate,spec,unit,minStock});
    // 同步初始化库存
    data.stock.push({mid:id,num:0});
    setLocalData(data);
    alert("添加成功，已自动云端同步");
    document.getElementById("mName").value = "";
    renderAll();
}

// 渲染全部
function renderAll(){
    renderMaterial();
    renderSelect();
    renderStock();
    renderInLog();
    renderOutLog();
}

// 渲染物料列表
function renderMaterial(){
    let data = getLocalData();
    let tb = document.getElementById("materialTable");
    let html = `<tr><th>名称</th><th>分类</th><th>规格</th><th>单位</th><th>预警</th><th>操作</th></tr>`;
    data.material.forEach(item=>{
        html += `<tr>
            <td>${item.name}</td>
            <td>${item.cate}</td>
            <td>${item.spec}</td>
            <td>${item.unit}</td>
            <td>${item.minStock}</td>
            <td><button class="del-row" onclick="delMaterial(${item.id})">删除</button></td>
        </tr>`;
    });
    tb.innerHTML = html;
}

// 删除物料
function delMaterial(id){
    if(!confirm("确定删除？"))return;
    let data = getLocalData();
    data.material = data.material.filter(x=>x.id!==id);
    data.stock = data.stock.filter(x=>x.mid!==id);
    setLocalData(data);
    renderAll();
}

// 下拉选择框
function renderSelect(){
    let data = getLocalData();
    let opt = "<option value=''>请选择物料</option>";
    data.material.forEach(item=>{
        opt += `<option value="${item.id}">${item.name}-${item.spec}</option>`;
    });
    document.getElementById("inGoods").innerHTML = opt;
    document.getElementById("outGoods").innerHTML = opt;
}

// 入库
function stockIn(){
    let mid = document.getElementById("inGoods").value;
    let num = Number(document.getElementById("inNum").value);
    let person = document.getElementById("inPerson").value.trim();
    let time = document.getElementById("inTime").value || new Date().toISOString().slice(0,16);
    let remark = document.getElementById("inRemark").value.trim();
    if(!mid || !num || !person){alert("请完善必填信息");return;}

    let data = getLocalData();
    // 更新库存
    let st = data.stock.find(x=>x.mid==mid);
    if(st) st.num += num;
    // 入库记录
    data.inLog.unshift({
        id:Date.now(),mid,num,person,time,remark,img:nowPhotoBase64
    });
    setLocalData(data);
    alert("入库成功，多人端已同步");
    document.getElementById("inNum").value = "";
    nowPhotoBase64 = "";
    document.getElementById("showPhoto").innerHTML = "";
    renderAll();
}

// 出库
function stockOut(){
    let mid = document.getElementById("outGoods").value;
    let num = Number(document.getElementById("outNum").value);
    let person = document.getElementById("outPerson").value.trim();
    let time = document.getElementById("outTime").value || new Date().toISOString().slice(0,16);
    let remark = document.getElementById("outRemark").value.trim();
    if(!mid || !num || !person){alert("请完善必填信息");return;}

    let data = getLocalData();
    let st = data.stock.find(x=>x.mid==mid);
    if(!st || st.num < num){alert("库存不足");return;}
    st.num -= num;

    data.outLog.unshift({
        id:Date.now(),mid,num,person,time,remark
    });
    setLocalData(data);
    alert("出库成功，多人端已同步");
    document.getElementById("outNum").value = "";
    renderAll();
}

// 渲染库存
function renderStock(){
    let key = document.getElementById("stockSearch").value.toLowerCase();
    let data = getLocalData();
    let tb = document.getElementById("stockTable");
    let html = `<tr><th>物料名称</th><th>分类</th><th>规格</th><th>单位</th><th>当前库存</th><th>预警线</th></tr>`;
    data.material.forEach(m=>{
        let st = data.stock.find(x=>x.mid==m.id) || {num:0};
        let warn = st.num < m.minStock ? "warn" : "";
        if(m.name.includes(key) || m.cate.includes(key)){
            html += `<tr>
                <td>${m.name}</td>
                <td>${m.cate}</td>
                <td>${m.spec}</td>
                <td>${m.unit}</td>
                <td class="${warn}">${st.num}</td>
                <td>${m.minStock}</td>
            </tr>`;
        }
    });
    tb.innerHTML = html;
}

// 渲染入库流水
function renderInLog(){
    let data = getLocalData();
    let tb = document.getElementById("inLogTable");
    let html = `<tr><th>时间</th><th>物料</th><th>数量</th><th>操作人</th><th>备注</th><th>图片</th></tr>`;
    data.inLog.forEach(log=>{
        let m = data.material.find(x=>x.id==log.mid) || {name:"已删除物料"};
        let imgHtml = log.img ? `<img src="${log.img}" class="img-preview">` : "无";
        html += `<tr>
            <td>${log.time}</td>
            <td>${m.name}</td>
            <td>${log.num}</td>
            <td>${log.person}</td>
            <td>${log.remark}</td>
            <td>${imgHtml}</td>
        </tr>`;
    });
    tb.innerHTML = html;
}

// 渲染出库流水
function renderOutLog(){
    let data = getLocalData();

        let m = data.material.find(x=>x.id==log.mid) || {name:"已删除物料"};

}

// 拍照转Base64
function handlePhoto(file){
    let reader = new FileReader();
    reader.onload = function(e){
        nowPhotoBase64 = e.target.result;
        document.getElementById("showPhoto").innerHTML = `<img src="${nowPhotoBase64}" style="max-width:120px;">`;
    }
    reader.readAsDataURL(file.files[0]);
}
