<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马迹山库存管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:10px;font-family:微软雅黑;background:#f5f5f5;font-size:14px;}
.container{max-width:100%;margin:0 auto;background:#fff;padding:15px;border-radius:8px;}
h2{text-align:center;margin-bottom:15px;color:#333;font-size:18px;}
.tab{display:flex;border-bottom:1px solid #ccc;margin-bottom:15px;flex-wrap:wrap;}
.tab-item{padding:8px 10px;cursor:pointer;font-size:13px;}
.tab-item.active{border-bottom:2px solid #007bff;color:#007bff;font-weight:bold;}
.box{display:none;}
.box.show{display:block;}
input,select,button{padding:8px;margin:3px;border:1px solid #ccc;border-radius:4px;font-size:14px;width:100%;max-width:280px;}
button{background:#007bff;color:white;border:none;cursor:pointer;}
.del-row{background:#dc3545;padding:4px 6px;font-size:12px;border:none;border-radius:3px;color:#fff;}
.print-btn{background:#28a745;margin-bottom:10px;max-width:120px;}
.photo-btn{background:#6c5ce7;max-width:280px;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
th,td{border:1px solid #ccc;padding:6px 2px;text-align:center;}
th{background:#eee;}
.warn{color:red;font-weight:bold;}
.tip{font-size:12px;color:#666;margin-left:4px;}
.search-box{width:100%;max-width:300px;margin-bottom:10px;}
.img-preview{max-width:60px;height:auto;cursor:pointer;}
#photoInput{display:none;}

.login-wrap{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#f5f5f5;
    display:flex;
    align-items:center;
    justify-content:center;
}
.login-box{
    background:#fff;
    padding:30px;
    border-radius:10px;
    width:90%;max-width:350px;
    position:relative;
    box-shadow:0 0 10px #ddd;
}
.login-logo{
    position:absolute;
    top:12px;
    left:15px;
    font-size:22px;
    font-weight:bold;
    color:#007bff;
}
.login-box h3{text-align:center;margin-bottom:20px;margin-top:10px;}
.login-btn1{background:#6c5ce7;}
.login-btn2{background:#28a745;}

.guest-mode .del-row{display:none !important;}

@media print{
  .tab,.print-btn,.del-row,#box0,#box1,#box2,#box3{display:none !important;}
  .box.show{display:block !important;}
  body{background:#fff;padding:0;}
  .container{padding:0;}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginPage">
    <div class="login-box">
        <div class="login-logo">仓库</div>
        <h3>马迹山仓库系统</h3>
        <input type="password" id="pwdInput" placeholder="请输入管理员密码">
        <button class="login-btn2" onclick="adminLogin()">管理员登录</button>
        <button class="login-btn1" onclick="guestLogin()">游客无密码进入</button>
    </div>
</div>

<div class="container" id="mainPage" style="display:none;">
    <h2>马迹山仓库</h2>
    <div class="tab">
        <div class="tab-item active" onclick="switchTab(0)">物料管理</div>
        <div class="tab-item" onclick="switchTab(1)">入库登记</div>
        <div class="tab-item" onclick="switchTab(2)">出库登记</div>
        <div class="tab-item" onclick="switchTab(3)">库存列表</div>
        <div class="tab-item" onclick="switchTab(4)">入库流水</div>
        <div class="tab-item" onclick="switchTab(5)">出库流水</div>
    </div>

    <div class="box show" id="box0">
        <h4>新增物料</h4>
        <input type="text" id="mName" placeholder="物料名称">
        <input type="text" id="mCate" placeholder="分类">
        <input type="text" id="mSpec" placeholder="规格">
        <input type="text" id="mUnit" placeholder="单位">
        <input type="number" id="mMin" placeholder="最低预警库存">
        <button onclick="addMaterial()">添加</button>
        <table id="materialTable"></table>
    </div>

    <div class="box" id="box1">
        <h4>物料入库</h4>
        <select id="inGoods"></select>
        <input type="number" id="inNum" placeholder="入库数量">
        <input type="text" id="inPerson" placeholder="入库人">
        <input type="datetime-local" id="inTime">
        <div class="tip">不选时间默认当前时间</div>
        <input type="text" id="inRemark" placeholder="存放楼层">
        
        <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
        <button class="photo-btn" onclick="document.getElementById('photoInput').click()">拍照/选择图片</button>
        <div id="showPhoto"></div>

        <button onclick="stockIn()">确认入库</button>
    </div>

    <div class="box" id="box2">
        <h4>物料出库</h4>
        <select id="outGoods"></select>
        <input type="number" id="outNum" placeholder="出库数量">
        <input type="text" id="outPerson" placeholder="出库人">
        <input type="datetime-local" id="outTime">
        <div class="tip">不选时间默认当前时间</div>
        <input type="text" id="outRemark" placeholder="用途备注">
        <button onclick="stockOut()">确认出库</button>
    </div>

    <div class="box" id="box3">
        <h4>当前库存（红色为库存不足）</h4>
        <input class="search-box" type="text" id="stockSearch" placeholder="搜索物料名称/分类" oninput="renderStock()">
        <table id="stockTable"></table>
    </div>

    <div class="box" id="box4">
        <h4>入库流水记录</h4>
        <button class="print-btn" onclick="printLog()">打印入库流水</button>
        <table id="inLogTable"></table>
    </div>

    <div class="box" id="box5">
        <h4>出库流水记录</h4>
        <button class="print-btn" onclick="printLog()">打印出库流水</button>
        <table id="outLogTable"></table>
    </div>
</div>

<script>
const ADMIN_PWD = "123456";
let isAdmin = false;

let material = JSON.parse(localStorage.getItem('material')) || [];
let inLog = JSON.parse(localStorage.getItem('inLog')) || [];
let outLog = JSON.parse(localStorage.getItem('outLog')) || [];
let tempPhotoBase64 = "";

function saveData(){
    localStorage.setItem('material',JSON.stringify(material));
    localStorage.setItem('inLog',JSON.stringify(inLog));
    localStorage.setItem('outLog',JSON.stringify(outLog));
}

function adminLogin(){
    let pwd = document.getElementById('pwdInput').value.trim();
    if(pwd === ADMIN_PWD){
        isAdmin = true;
        enterSystem();
    }else{
        alert('密码错误');
    }
}
function guestLogin(){
    isAdmin = false;
    enterSystem();
}
function enterSystem(){
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    if(!isAdmin){
        document.getElementById('mainPage').classList.add('guest-mode');
    }
    switchTab(0);
}

function printLog(){
    window.print();
}

function handlePhoto(input){
    let file = input.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(e){
        tempPhotoBase64 = e.target.result;
        document.getElementById('showPhoto').innerHTML = `<img src="${tempPhotoBase64}" style="max-width:120px;margin:5px 0;border:1px solid #ccc;">`;
    }
    reader.readAsDataURL(file);
}
function showBigImg(src){
    let newWin = window.open("");
    newWin.document.write(`<img src="${src}" style="width:100%;">`);
}

function switchTab(idx){
    document.querySelectorAll('.box').forEach(el=>el.classList.remove('show'));
    document.querySelectorAll('.tab-item').forEach((el,i)=>{
        i===idx ? el.classList.add('active') : el.classList.remove('active');
    });
    document.getElementById('box'+idx).classList.add('show');
    if(idx===0) renderMaterial();
    if(idx===3) renderStock();
    if(idx===4) renderInLog();
    if(idx===5) renderOutLog();
    if(idx===1||idx===2) renderSelect();
}

function addMaterial(){
    let name = document.getElementById('mName').value.trim();
    let cate = document.getElementById('mCate').value.trim();
    let spec = document.getElementById('mSpec').value.trim();
    let unit = document.getElementById('mUnit').value.trim();
    let minStock = parseInt(document.getElementById('mMin').value) || 0;
    if(!name){alert('请输入物料名称');return;}
    material.push({
        id:Date.now(),
        name,cate,spec,unit,
        stock:0,
        min:minStock
    });
    saveData();
    renderMaterial();
    alert('添加成功');
    document.querySelectorAll('#box0 input').forEach(el=>el.value='');
}

function renderMaterial(){
    let tab = document.getElementById('materialTable');
    tab.innerHTML = '<tr><th>名称</th><th>分类</th><th>规格</th><th>单位</th><th>预警</th><th>操作</th></tr>';
    material.forEach((item,index)=>{
        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.name}</td>
            <td>${item.cate}</td>
            <td>${item.spec}</td>
            <td>${item.unit}</td>
            <td>${item.min}</td>
            <td><button class="del-row" onclick="delMaterial(${index})">删除</button></td>
        `;
        tab.appendChild(tr);
    });
}

function delMaterial(index){
    if(!isAdmin){alert('无权限删除');return;}
    if(confirm('确定删除该物料？')){
        material.splice(index,1);
        saveData();
        renderMaterial();
    }
}

function renderSelect(){
    let inSel = document.getElementById('inGoods');
    let outSel = document.getElementById('outGoods');
    inSel.innerHTML = '<option value="">请选择物料</option>';
    outSel.innerHTML = '<option value="">请选择物料</option>';
    material.forEach(item=>{
        inSel.innerHTML += `<option value="${item.id}">${item.name}-${item.spec}</option>`;
        outSel.innerHTML += `<option value="${item.id}">${item.name}-${item.spec}</option>`;
    });
}

function getNowTime(){
    let d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0')+" "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');
}

function stockIn(){
    let id = parseInt(document.getElementById('inGoods').value);
    let num = parseInt(document.getElementById('inNum').value);
    let person = document.getElementById('inPerson').value.trim();
    let time = document.getElementById('inTime').value || getNowTime();
    let remark = document.getElementById('inRemark').value.trim();
    if(!id || !num || num<=0){alert('请选择物料并输入有效数量');return;}
    let mat = material.find(x=>x.id===id);
    mat.stock += num;
    inLog.unshift({
        mid: mat.id,
        mName:mat.name,
        spec:mat.spec,
        num,person,time,
        floor:remark,
        photo: tempPhotoBase64
    });
    saveData();
    alert('入库成功');
    document.getElementById('inNum').value='';
    document.getElementById('inPerson').value='';
    document.getElementById('inRemark').value='';
    document.getElementById('showPhoto').innerHTML = '';
    tempPhotoBase64 = "";
    renderInLog();
}

function stockOut(){
    let id = parseInt(document.getElementById('outGoods').value);
    let num = parseInt(document.getElementById('outNum').value);
    let person = document.getElementById('outPerson').value.trim();
    let time = document.getElementById('outTime').value || getNowTime();
    let remark = document.getElementById('outRemark').value.trim();
    if(!id || !num || num<=0){alert('请选择物料并输入有效数量');return;}
    let mat = material.find(x=>x.id===id);
    if(mat.stock < num){alert('库存不足，无法出库');return;}
    mat.stock -= num;
    outLog.unshift({
        mid: mat.id,
        mName:mat.name,
        spec:mat.spec,
        num,person,time,
        useRemark:remark
    });
    saveData();
    alert('出库成功');
    document.getElementById('outNum').value='';
    document.getElementById('outPerson').value='';
    document.getElementById('outRemark').value='';
    renderOutLog();
}

function delInLog(idx){
    if(!isAdmin){alert('无权限删除');return;}
    if(!confirm('确定删除这条入库记录？库存将自动退回'))return;
    let row = inLog[idx];
    let mat = material.find(item=>item.id === row.mid);
    if(mat) mat.stock -= row.num;
    inLog.splice(idx,1);
    saveData();
    renderInLog();
    renderStock();
}

function delOutLog(idx){
    if(!isAdmin){alert('无权限删除');return;}
    if(!confirm('确定删除这条出库记录？库存将自动恢复'))return;
    let row = outLog[idx];
    let mat = material.find(item=>item.id === row.mid);
    if(mat) mat.stock += row.num;
    outLog.splice(idx,1);
    saveData();
    renderOutLog();
    renderStock();
}

function renderStock(){
    let key = document.getElementById('stockSearch').value.toLowerCase();
    let tab = document.getElementById('stockTable');
    tab.innerHTML = '<tr><th>名称</th><th>分类</th><th>规格</th><th>单位</th><th>当前库存</th><th>预警库存</th></tr>';
    material.forEach(item=>{
        if(item.name.toLowerCase().includes(key) || item.cate.toLowerCase().includes(key)){
            let tr = document.createElement('tr');
            let warn = item.stock <= item.min ? 'warn' : '';
            tr.innerHTML = `
                <td>${item.name}</td>
                <td>${item.cate}</td>
                <td>${item.spec}</td>
                <td>${item.unit}</td>
                <td class="${warn}">${item.stock}</td>
                <td>${item.min}</td>
            `;
            tab.appendChild(tr);
        }
    });
}

function renderInLog(){
    let tab = document.getElementById('inLogTable');
    tab.innerHTML = '<tr><th>时间</th><th>物料</th><th>规格</th><th>数量</th><th>入库人</th><th>存放楼层</th><th>照片</th><th>操作</th></tr>';
    inLog.forEach((item,idx)=>{
        let imgHtml = item.photo ? `<img src="${item.photo}" class="img-preview" onclick="showBigImg('${item.photo}')">` : "无";
        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.time}</td>
            <td>${item.mName}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${item.person}</td>
            <td>${item.floor||''}</td>
            <td>${imgHtml}</td>
            <td><button class="del-row" onclick="delInLog(${idx})">删除</button></td>
        `;
        tab.appendChild(tr);
    });
}

function renderOutLog(){
    let tab = document.getElementById('outLogTable');
    tab.innerHTML = '<tr><th>时间</th><th>物料</th><th>规格</th><th>数量</th><th>出库人</th><th>用途备注</th><th>操作</th></tr>';
    outLog.forEach((item,idx)=>{
        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.time}</td>
            <td>${item.mName}</td>
            <td>${item.spec}</td>
            <td>${item.num}</td>
            <td>${item.person}</td>
            <td>${item.useRemark||''}</td>
            <td><button class="del-row" onclick="delOutLog(${idx})">删除</button></td>
        `;
        tab.appendChild(tr);
    });
}
</script>

<script>
// 空闲3分钟自动刷新，打字/操作不打断
let idleTime = 0;
const maxIdle = 180;
function resetIdle(){ idleTime = 0; }
window.addEventListener('keydown', resetIdle);
window.addEventListener('mousemove', resetIdle);
window.addEventListener('scroll', resetIdle);
window.addEventListener('click', resetIdle);
setInterval(function(){
    idleTime++;
    if(idleTime >= maxIdle){
        location.reload();
    }
},1000);
</script>

</body>
</html>
